# USO DE SEMANTIC RELASE
# Este workflow generara versiones y releases automáticamente al pushear a main.
# Se recomienda utilizar un archivo .github/release.yml para configurar el CHANGELOG.
# (Sobre todo si se suben cambios feat/.. -> dev -> main) ver examples/release-config.yml
#
# Copia este archivo a: .github/workflows/release.yml en tu repositorio.

name: Release Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: # <- Boton manual en GitHub

jobs:
  call-release:
    name: Call Shared Release
    uses: lyoss-usm/workflows/.github/workflows/semantic-release.yml@main
    secrets: inherit # Esto usa los secretos del repo o de la organizacion. (GH_PAT es requerido)
